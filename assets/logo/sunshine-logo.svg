    <path d="M 778 290 Q 830 268 872 258" stroke-width="14"/>
    <path d="M 105 345 L 255 412" stroke-width="14"/>
    <path d="M 850 392 L 920 388" stroke-width="13"/>
    <!-- horizon : double trait croisé façon esquisse -->
    <path d="M 330 510 Q 660 488 1015 502 L 1015 502 Q 700 506 150 538
