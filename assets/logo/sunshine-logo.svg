<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <title>Sunshine Browser — logo v1</title>
  <desc>Soleil levant orange sur l'horizon, tracé style dessin à main levée.</desc>
  <g fill="none" stroke="#E8A23C" stroke-linecap="round">
