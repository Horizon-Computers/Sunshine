<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; margin: 0; padding: 14px;
           font: 13px/1.5 "Segoe UI", Arial, sans-serif;
           color: #3A2E1E; background: #FFF8EE; }
    h1 { font-size: 14px; margin: 0 0 10px; color: #C9842A; }
    #stats { background: #fff; border-radius: 9px; padding: 8px 10px;
             margin-bottom: 10px; box-shadow: 0 1px 4px rgba(58,46,30,.08); }
    #stats h2 { font-size: 12px; margin: 0 0 4px; color: #C9842A; }
    #stats p { margin: 0 0 4px; font-weight: 600; }
    #stats ul { margin: 0 0 4px; padding-left: 18px; }
    #stats li { margin: 1px 0; }
    label { display: block; margin: 8px 0; }
    .num { width: 56px; }
    textarea { width: 100%; box-sizing: border-box; height: 88px;
               border: 1px solid #d8c9a8; border-radius: 7px; padding: 6px; }
    input[type="number"] { border: 1px solid #d8c9a8; border-radius: 6px;
                           padding: 3px 5px; }
    button { margin-top: 10px; padding: 7px 14px; border: 0;
             border-radius: 8px; background: #E8A23C; color: #fff;
             cursor: pointer; }
    button:hover { background: #C9842A; }
    #status { margin-left: 8px; color: #3e7a2e; }
    .hint { color: #8a7a62; font-size: 11px; margin-top: 2px; }
  </style>
</head>
<body>
  <h1 data-i18n="title">🧘 Sunshine Focus</h1>

  <div id="stats">
    <h2 data-i18n="statsToday">Aujourd'hui</h2>
    <p id="stats-total"></p>
    <ul id="stats-sites"></ul>
    <div class="hint" data-i18n="statsHint">Statistiques locales (7 jours), jamais transmises.</div>
  </div>

  <label><input type="checkbox" id="enabled">
    <span data-i18n="enable">Activer Sunshine Focus</span></label>
  <label><span data-i18n="pauseEvery">Pause tous les</span>
    <input type="number" id="screens" class="num" min="0" max="100">
    <span data-i18n="screensSuffix">écrans</span>
    <div class="hint" data-i18n="zeroOff">0 = désactivé</div>
  </label>
  <label><span data-i18n="remindEvery">Rappel toutes les</span>
    <input type="number" id="minutes" class="num" min="0" max="240">
    <span data-i18n="minutesSuffix">minutes</span>
    <div class="hint" data-i18n="zeroOff">0 = désactivé</div>
  </label>
  <label><input type="checkbox" id="hide-shorts">
    <span data-i18n="hideShorts">Masquer Shorts / Reels / tendances</span></label>
  <label><span data-i18n="sites">Sites surveillés (un par ligne)</span>
    <textarea id="sites"></textarea>
  </label>
  <button id="save" data-i18n="save">Enregistrer</button><span id="status"></span>
  <script type="module" src="popup.js"></script>
</body>
</html>
