name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier la syntaxe des scripts shell
        run: bash -n scripts/*.sh

      - name: Vérifier la syntaxe Python
        run: python3 -m py_compile scripts/apply_branding.py

      - name: Vérifier le fichier VERSION
        run: |
          grep -qE '^SUNSHINE_VERSION=[0-9]+\.[0-9]+\.[0-9]+$' VERSION
          grep -qE '^BRAVE_VERSION=[0-9]+\.[0-9]+\.[0-9]+$' VERSION
          grep -qE '^CHROMIUM_VERSION=[0-9.]+$' VERSION

      - name: Valider les SVG et générer les icônes
        run: |
          sudo apt-get update -q && sudo apt-get install -qy librsvg2-bin libxml2-utils
          xmllint --noout assets/logo/*.svg
          ./scripts/generate_icons.sh

      - name: Publier les icônes générées en artefact
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-icons
          path: assets/logo/png/
