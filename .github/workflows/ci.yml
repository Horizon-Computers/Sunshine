name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier la syntaxe des scripts shell
        run: bash -n scripts/*.sh

      - name: Shellcheck (erreurs uniquement)
        run: |
          sudo apt-get update -q && sudo apt-get install -qy shellcheck
          shellcheck -S error scripts/*.sh

      - name: Vérifier la syntaxe Python
        run: python3 -m py_compile scripts/apply_branding.py

      - name: Vérifier le fichier VERSION
        run: |
          grep -qE '^SUNSHINE_VERSION=[0-9]+\.[0-9]+\.[0-9]+$' VERSION
          grep -qE '^BRAVE_VERSION=[0-9]+\.[0-9]+\.[0-9]+$' VERSION
          grep -qE '^CHROMIUM_VERSION=[0-9.]+$' VERSION

      - name: Tests unitaires Python
        run: python3 -m unittest discover -s tests -v

      - name: Tests JavaScript (Sunshine Assistant)
        run: |
          for f in extensions/*/*.js; do node --input-type=module --check < "$f"; done
          node --test tests/js/test_assistant.mjs

      - name: Valider les SVG et générer les icônes (PNG + ICO + ICNS)
        run: |
          sudo apt-get update -q
          sudo apt-get install -qy librsvg2-bin libxml2-utils imagemagick icnsutils desktop-file-utils
          xmllint --noout assets/logo/*.svg
          desktop-file-validate branding/linux/sunshine-browser.desktop
          python3 -c "import json; json.load(open('branding/initial_preferences.json'))"
          ./scripts/generate_icons.sh

      - name: Générer la personnalisation
        run: |
          python3 scripts/customize.py
          python3 -c "import json; json.load(open('customize/generated/theme/manifest.json'))"

      - name: Test de bout en bout du packaging Linux (build factice + personnalisation)
        run: |
          mkdir -p /tmp/fake-out/Release/locales
          printf '#!/bin/sh\necho "STUB $@"\n' > /tmp/fake-out/Release/brave
          chmod +x /tmp/fake-out/Release/brave
          echo PAK > /tmp/fake-out/Release/resources.pak
          echo ICU > /tmp/fake-out/Release/icudtl.dat
          ./scripts/package_linux.sh /tmp/fake-out/Release
          dpkg-deb --info dist/sunshine-browser_*.deb
          CONTENTS="$(dpkg-deb --contents dist/sunshine-browser_*.deb)"
          for path in usr/bin/sunshine-browser \
                      opt/sunshine-browser/initial_bookmarks.html \
                      opt/sunshine-browser/extensions/sunshine-theme/manifest.json \
                      opt/sunshine-browser/extensions/sunshine-assistant/manifest.json \
                      opt/sunshine-browser/extensions/sunshine-assistant/panel.html \
                      etc/sunshine-browser/policies/managed/sunshine.json \
                      etc/sunshine-browser/flags.conf; do
            echo "${CONTENTS}" | grep -q "${path}"
          done
          tar -tzf dist/sunshine-browser-*-linux-*.tar.gz | grep -q sunshine-browser/initial_preferences

      - name: Test d'installation réelle du .deb (lanceur + drapeaux)
        run: |
          sudo dpkg -i --force-depends dist/sunshine-browser_*.deb
          echo "--ci-test-flag" | sudo tee -a /etc/sunshine-browser/flags.conf
          sunshine-browser --user-flag | grep -q -- "--ci-test-flag --user-flag"
          sudo dpkg -r sunshine-browser

      - name: Test du dépôt APT (génération + résolution apt)
        run: |
          ./scripts/make_apt_repo.sh
          echo "deb [trusted=yes] file:$(pwd)/apt stable main" \
            | sudo tee /etc/apt/sources.list.d/sunshine-test.list
          sudo apt-get update -o Dir::Etc::SourceList=/etc/apt/sources.list.d/sunshine-test.list \
                              -o Dir::Etc::SourceParts=/dev/null
          apt-cache policy sunshine-browser | grep -q "Candidate: $(grep SUNSHINE_VERSION VERSION | cut -d= -f2)"
          sudo rm /etc/apt/sources.list.d/sunshine-test.list

      - name: Test du packaging Windows (build factice)
        run: |
          mkdir -p /tmp/win-out/Release/locales
          printf 'MZ' > /tmp/win-out/Release/brave.exe
          printf 'DLL' > /tmp/win-out/Release/chrome_elf.dll
          echo PAK > /tmp/win-out/Release/resources.pak
          ./scripts/package_windows.sh /tmp/win-out/Release
          unzip -l dist/sunshine-browser-*-windows-x64.zip | grep -q Sunshine/sunshine.exe
          unzip -l dist/sunshine-browser-*-windows-x64.zip | grep -q Sunshine/extensions/sunshine-assistant/manifest.json
          grep -q "AppVersion=$(grep SUNSHINE_VERSION VERSION | cut -d= -f2)" dist/sunshine-setup.iss

      - name: Publier les icônes générées en artefact
        uses: actions/upload-artifact@v4
        with:
          name: sunshine-icons
          path: assets/logo/png/
