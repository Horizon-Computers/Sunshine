# Déploie le site vitrine (site/) — et le dépôt APT si des .deb sont
# attachés à la dernière release — sur GitHub Pages.
# Activer Pages dans Settings → Pages → Source : « GitHub Actions ».
name: Site (GitHub Pages)

on:
  push:
    branches: [main]
    paths: ["site/**", "assets/logo/**", "scripts/make_apt_repo.sh", ".github/workflows/pages.yml"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assembler le site
        run: |
          mkdir -p site/logo
          cp assets/logo/*.svg site/logo/

      - name: Intégrer le dépôt APT (si des .deb sont publiés en release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/debs
          gh release download --pattern '*.deb' --dir /tmp/debs \
            --repo "${GITHUB_REPOSITORY}" 2>/dev/null \
            || { echo "Aucun .deb dans la dernière release : site sans dépôt APT"; exit 0; }
          ./scripts/make_apt_repo.sh /tmp/debs
          cp -r apt site/apt
          echo "Dépôt APT intégré au site (apt/)"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - id: deployment
        uses: actions/deploy-pages@v4
