# Déploie le site vitrine (site/) sur GitHub Pages à chaque push sur main.
# Activer Pages dans Settings → Pages → Source : « GitHub Actions ».
name: Site (GitHub Pages)

on:
  push:
    branches: [main]
    paths: ["site/**", "assets/logo/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assembler le site
        run: |
          mkdir -p site/logo
          cp assets/logo/*.svg site/logo/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - id: deployment
        uses: actions/deploy-pages@v4
